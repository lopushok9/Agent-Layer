name: npm installer

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python wallet package
        run: python -m pip install -e agent-wallet

      - name: Check npm installer CLI
        run: npm run check

      - name: Check release version metadata
        run: npm run check:release-version

      - name: Test release promotion policy
        run: npm run test:release-promotion

      - name: Smoke npm installer wrapper
        run: python agent-wallet/tests/smoke_npm_installer.py

      - name: Smoke universal installer
        run: python agent-wallet/tests/smoke_install_agent_wallet.py

      - name: Smoke GitHub bootstrap installer
        run: python agent-wallet/tests/smoke_install_from_github.py

      - name: Smoke release bundle builder
        run: python agent-wallet/tests/smoke_build_release_bundle.py

      - name: Smoke sealed config installer
        run: python agent-wallet/tests/smoke_install_openclaw_local_config_sealed.py

      - name: Smoke verified boot-key resolution
        run: python agent-wallet/tests/smoke_boot_key_verified_resolution.py

      - name: Smoke staged boot-key rejection
        run: python agent-wallet/tests/smoke_install_rejects_unverified_boot_key.py

      - name: Smoke legacy update boot-key precedence
        run: python agent-wallet/tests/smoke_legacy_update_boot_key_precedence.py

      - name: Smoke staged install failure isolation
        run: python agent-wallet/tests/smoke_install_verify_rollback.py

      - name: Smoke interrupted commit recovery
        run: python agent-wallet/tests/smoke_update_recovers_interrupted_commit.py

      - name: Smoke update lock
        run: python agent-wallet/tests/smoke_update_lock.py

      - name: Smoke update recovery diagnostics
        run: python agent-wallet/tests/smoke_update_recovery_status.py

      - name: Smoke editor path migration
        run: python agent-wallet/tests/smoke_update_repairs_editor_installs.py

      - name: Smoke unmanaged integration preservation
        run: python agent-wallet/tests/smoke_update_preserves_unmanaged_integrations.py

      - name: Smoke integration failure isolation
        run: python agent-wallet/tests/smoke_update_isolates_integration_failures.py

      - name: Smoke global CLI refresh
        run: python agent-wallet/tests/smoke_update_refreshes_global_cli.py

      - name: Smoke host integration ownership registry
        run: python agent-wallet/tests/smoke_integration_registry.py

      - name: Smoke EVM wrong-home daemon recovery
        run: python agent-wallet/tests/smoke_openclaw_evm_runtime_restart_wrong_home.py

      - name: Smoke EVM daemon ownership
        run: python agent-wallet/tests/smoke_evm_service_ownership.py

      - name: Test EVM daemon instance identity
        run: npm run test:identity --prefix wdk-evm-wallet

      - name: Validate npm package contents
        run: npm pack --dry-run

  publish:
    needs: verify
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    concurrency:
      group: agent-wallet-npm-release
      cancel-in-progress: false
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Check release version metadata
        id: version
        run: npm run check:release-version

      - name: Publish npm package
        run: npm publish --access public --tag "${{ steps.version.outputs.npm_tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ steps.version.outputs.npm_tag }}" = "beta" ]; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes \
              --prerelease
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
