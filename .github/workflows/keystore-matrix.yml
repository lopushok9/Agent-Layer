name: keystore matrix

# Real cross-OS verification of the boot-key keystore. Local dev can only exercise
# the host OS (usually macOS); this drives the actual Windows DPAPI and Linux
# Secret Service backends on their real runners, plus the plaintext fallback.

on:
  pull_request:
    paths:
      - "agent-wallet/agent_wallet/keystore.py"
      - "agent-wallet/agent_wallet/config.py"
      - "agent-wallet/agent_wallet/boot_key_migration.py"
      - "agent-wallet/agent_wallet/boot_key_recovery.py"
      - "agent-wallet/tests/smoke_keystore*.py"
      - "agent-wallet/tests/smoke_boot_key_*.py"
      - ".github/workflows/keystore-matrix.yml"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  roundtrip:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-keychain
            os: macos-latest
            expect: macos-keychain
          - name: windows-dpapi
            os: windows-latest
            expect: windows-dpapi
          - name: linux-fallback
            os: ubuntu-latest
            expect: plaintext-file
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # A deterministic, unlocked default keychain so security(1) writes/reads
      # never depend on the runner's ambient keychain state.
      - name: Prepare macOS keychain
        if: runner.os == 'macOS'
        run: |
          security create-keychain -p ci-pass ci.keychain-db
          security set-keychain-settings ci.keychain-db
          security unlock-keychain -p ci-pass ci.keychain-db
          security list-keychains -d user -s ci.keychain-db "$(security default-keychain -d user | tr -d ' \"')"
          security default-keychain -s ci.keychain-db

      - name: Install Python wallet package
        run: python -m pip install -e agent-wallet

      - name: Keystore native round-trip
        shell: bash
        env:
          AGENT_WALLET_EXPECT_BACKEND: ${{ matrix.expect }}
        run: python agent-wallet/tests/smoke_keystore_native_roundtrip.py

      - name: Install-time keystore bridge (Node -> Python CLI contract)
        shell: bash
        env:
          AGENT_WALLET_EXPECT_BACKEND: ${{ matrix.expect }}
        run: python agent-wallet/tests/smoke_install_keystore_bridge.py

      - name: Boot-key smoke suite
        shell: bash
        run: |
          set -e
          for t in smoke_keystore \
                   smoke_keystore_backend_state \
                   smoke_keystore_preexisting_acl \
                   smoke_boot_key_keystore_readthrough \
                   smoke_boot_key_migration \
                   smoke_boot_key_startup_wiring \
                   smoke_boot_key_recovery \
                   smoke_sealed_keys; do
            echo "== $t =="
            python "agent-wallet/tests/$t.py"
          done

      # Regression guard for the real-user "keychain is locked" state (SSH
      # session, post-reboot): resolution must fall back to plaintext-file in
      # bounded time, not hang on an unlock dialog. Locks the throwaway CI
      # keychain, so this runs LAST in the macOS job.
      - name: Locked keychain falls back to plaintext
        if: runner.os == 'macOS'
        env:
          AGENT_WALLET_LOCKED_KEYCHAIN_TEST: "1"
        run: |
          security lock-keychain ci.keychain-db
          python agent-wallet/tests/smoke_keystore_locked_fallback.py

  # Real Linux Secret Service via an unlocked gnome-keyring. The in-CI keyring
  # unlock is finicky, so this is best-effort (informational) rather than a hard
  # gate; the plaintext fallback above is the Linux hard gate.
  linux-secretservice:
    name: linux-secretservice (best-effort)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install libsecret + gnome-keyring
        run: |
          sudo apt-get update
          sudo apt-get install -y libsecret-tools gnome-keyring dbus-x11

      - name: Install Python wallet package
        run: python -m pip install -e agent-wallet

      - name: Round-trip under an unlocked gnome-keyring
        env:
          AGENT_WALLET_EXPECT_BACKEND: linux-secretservice
        run: |
          dbus-run-session -- bash -c '
            printf "\n" | gnome-keyring-daemon --unlock --components=secrets
            sleep 1
            python agent-wallet/tests/smoke_keystore_native_roundtrip.py
          '
